name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 * * 1,3,5' # Hétfőn, szerdán és pénteken fut reggel 9-kor (hetente 3x)
  workflow_dispatch: # kézi futtatás lehetősége a GitHub Actions felületéről

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase – profiles tábla lekérdezése
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          echo "Supabase URL megvan: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' }}"
          curl -f \
            "${SUPABASE_URL}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}"
          echo "Supabase aktív és elérhető."
